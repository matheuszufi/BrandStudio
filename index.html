<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blank Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-left">
            <img src="imagens/logo-white.png" alt="Logo" class="header-logo">
            <span class="brand">brand</span><span class="studio">studio</span>
        </div>
        <nav class="header-menu">
            <a href="#" class="menu-link">Portfolio</a>
            <a href="#" class="menu-link">Serviços</a>
            <a href="#" class="menu-link">Equipe</a>
        </nav>
        <div class="header-right">
            <button class="orcamento-btn">Faça um orçamento</button>
        </div>
    </header>
    <section class="hero">
        <div class="hero-content">
            <div class="hero-top">
                <div class="hero-logo-nome">
                    <img src="imagens/logo.png" alt="Logo" class="hero-logo-img">
                    <span class="brand">brand</span><span class="studio">studio</span>
                </div>
                <div class="hero-subtitle">
                    Especializados em Desenvolvimento de&nbsp;Sites Institucionais
                </div>
            </div>
            <div class="hero-gifs">
                <img src="imagens/icons/grafico-teste.gif" alt="Gráfico" class="hero-gif">
                <img src="imagens/icons/teste-responsive.gif" alt="Responsivo" class="hero-gif">
            </div>
            <button class="hero-contact-btn">Entrar em contato</button>
        </div>
    </section>
</body>
</html>
